<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For my love</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="envelope-container">
        <img src="envelope.png" alt="envelope" id="envelope" >
        <p class="greeting">Hello! You got a letter from your lover!</p>
    </div>
    <div id="letter-container">
        <div class="letter-window">
            <h1 id="letter-title">Will you be my Valentine?</h1>
            
            <img src="cat_heart.gif" alt="" id="letter-cat" class="cat">
            
            <div id="button-container" class="buttons">
                <img src="yes.png" alt="yes" class="btn yes-btn">
                <div class="no-wrapper">
                    <img src="no.png" alt="no" class="btn no-btn">
                </div>    
            </div>
            <p class="final-text" style="display:none">
                <strong>Valentine Date: </strong> Let's go to Jim Jum 89 together!
            </p>                                                 
        </div>       
    </div>
    <div class="bouncy-img"></div>
    <script src="script.js"></script>
</body>
</html>
